body:
  text: 六宗者花巖法相三論成實俱舍今一宗不載之而是律宗歟華嚴宗未決文義如左合六條一明三乘共教菩薩回入一乘位法藏師説云云不同若依疏文速入不空極遲立考立恐之人至地前十回向位皆悉回竟更無證地不回入人也若依五教文彼求牛人已出界外故不同凡夫乃至未得露地大白牛車故不同一乘至自位究竟處故後皆進入別教一乘者何位名為自位究竟處此義云何二壽命品云以娑婆一劫於極樂世界為一晝夜者劫數不同若就何劫以為一劫此義云何三第十地受位分所説受職相有大乘師説自受用身佛成道相撿論即是取於現報益相以為後報益相此文相違如水與火此義云何四又終南山儼法師釋受職菩薩位在第三禪據外相當補處此不分明彼受職生亦可第三禪耶此義云何五下本十萬偈中品數難定或三十七品或三十八品或三十九品或四十四品或四十八品皆梵本品數耶若後人開出耶此文云何六新舊二經釋愛見善惠輪王之子其數不同六十卷經有二萬五千也八十卷經有五百也此文云何大法師性泰法師軌耀滿位僧澄睿滿位僧賢琳大學頭大法師善福大學頭法師春福小學頭滿位僧圓德法相大乘諸經論章疏中未決義如左合十九條一菩薩處胎經中或有衆生不向信地法地直向阿羅漢乃至云或有從阿羅漢果墜墮凡夫地等云云若依大乘常從之義即無此義其旨如何二又彼經云佛臥棺中告阿難言摩訶迦葉來耶阿難言未來佛問言牛呞比丘至不阿難言牛呞比丘住忉利天已入涅槃唯彼衣鉢到等云云案四分律及集藏傳等如等諸事佛滅度後結集時事前後相遠如何會釋三問鐵圍山大小聖教中所載故法花云謂鐵圍山大鐵圍山未知須彌山亦有大小耶若言有者所具諸天及其三界亦可有大小若許爾者同界業報豈有增減若言須彌大小者何故信力入印法問經第四卷云於四天下諸須彌山大須彌山無所妨礙等云云其文分明豈無大小耶四問空中鳥迹若是天眼之所見耶以不若所見者何故維摩經云如第五大如第六蘊乃至如空中鳥迹云既是無體豈天眼境若不見者何故央掘摩羅經第二卷云如阿那律天眼第一真實明見空中鳥迹與宍眼者俱共逝行彼宍眼者所不能見云云文既分明故知天眼能見空中鳥迹豈不相違五問普耀經及摩耶經等云摩耶夫人生太子已徑於七日生忉利天何故優婆夷淨行法門經下卷云菩薩生七日已其母命終生兜率天受快樂等諸聖教中生處不同如何和會六問菩薩處胎經第五卷出經品云佛滅度已後徑七日七夜大迦葉等結集三藏等云云又大悲經第三卷云迦葉阿難佛滅度後過四百年結集三藏利益天人等又智度論云佛入滅後夏安居三月十五日説戒時諸結集處等又西域記夏安居初十五日集等如此論文如前考前恐衍何和會七廣百論第八卷中有為心等亦有方分等云云又成唯識論云若無方分如心心所應不共聚生粗果色又廣百論文軌師疏云其心心法漸漸分析至一剎那剎那亦有多分所成等云云此等所説云何相違八案附法藏傳相傳有二十四人今疑若約智續考續疑違歟深德高列其名耶若言爾者無著菩薩既是世親等之本師也故辨中邊論頌曰稽首造此論善逝體所生及教我等師當勤顯此義又瑜伽釋論云無著菩薩登極喜地證法光定奉大意請説此論其德特尊依何所以獨不入耶若言入者未審二十四誰人是耶若言略而不入者十七地論為首佛法盛行猶依此聖豈可略耶願詳其所由也九清辨菩薩所造掌珍論立量云真性有為空等大乘基法師云宗有所別一分不成過若爾其簡別真性若入有法耶以不若言入者其真性言清辨護法皆共所許何為有法一分不成耶若言不入者有法唯一望何而名有法一分耶又既是大佛頂入因修證經比量豈佛比量有此過耶十唯識樞要云如幻喻中若依俗諦即有二微若似事幻若實事幻隨其所應即有能立所立不成等云云因明疏云因喻之法不應分別既一師語如何相違十一大乘基師三類境義若依其義且自證分緣見分時所緣見分有緣慮實用又此見分與自證分同種子生有性境獨影之義耶以不云云十二問聲聞極疾三生得果第一生中殖解脫分第二生中殖決擇分第三考三下恐脫生字中即入見道獨覺極疾四生得果於前三生更加行生名四生耶十三大小乘宗中舍利弗是麟角種未滿因故不得彼果耳云云麟角既是一向定性豈法華會中得授記耶十四唯識比量共自諍論是非義子細可決十五圓測師云立分諸師語雖似異理無乖違若爾安慧論師相見遍計唯自體分是依他性既與諸師水火相違豈得無乖無著護法十六無垢稱經大小融入義中考中下恐脫大字乘基師疏八釋其旨可決十七因明宗中作法萬端一比量中具三十三過耶若許具者其作法何耶十八十四過類中種種之義子細可決十九基法師因明疏上卷初除所因門外更有序此間雖在本甚考甚恐勘草不得傳流真本可請以前十九條未決之義注顯如件大法師明秀大法師明一大法師玄愷無相大乘宗欲求經論章疏并未決義如左合十條一大乘妙智經中觀心論清辨菩薩造般若燈論清辨菩薩釋大佛頂經疏分別明菩薩般若燈論疏吉藏師二十卷草右件經等雖聞其名未得其實冀因使求二大乘基法師云清辨菩薩自作比量建立唯境三又云無第八識等云云右二條義唯聞彼家言未見此宗文今案掌珍論是義不然論主引經頌云我定依於我等長行釋曰依世俗諦説心為我邁云謂心定依於心也一切三界皆心為體等云云此即唯心之文非是唯境明矣又論云由得考得下恐脫對字治道種子所依異熟識中分別等種無餘永斷既云種子所依異熟識故知非無識體今附學生請其誡文四掌珍論云真性有為空如幻緣生故等大佛頂經及廣百論亦有此量右件經論文義既同然大乘基師云此量有有法一分及能別立過等云云若此論量實有過者佛經比量及廣百量亦有此過耶此疑未決請聞實義考成慶案此以下可一箇緣然者上清辨建立唯境與無第八識文束之可為第二條歟大乘基師云掌珍論量有有法一分不成過謂我不許汝空勝義故等云云右件一過是似過也真性之言為簡能依不相離過於法有法都無損益非本為遮所依過故又共量簡別必須真言故內外大小共用簡別得立比量若分別差別者何處誰人得立真性量所別不成有差別過亦是非故論以眼等為有法故真性雖宗而非有法有法一分之言名實既相違云何通釋耶五掌珍論云數論師云我立大等諸轉變聚是所顯性緣生因故隨一不成論主破云謂諸色覺非緣所顯隨彼別緣有轉異故如瓶盆等邁云是立量破也右一條文義不明也數論師家許瓶盆等亦緣所顯由此同喻所立不成然則本因還復隨一不成未知邁師以何意趣作如是釋六理門論九句中第四句云同品非有異品有右件一句其義有疑今案作法云聲常為宗所作性因虛空為同瓶及兔角是異法喻所作性因於同非有於異品俱即與第六無差別何必九句若約有體成九句者不取無體何意趣也唯取有體還同古師相害為異即違陳那取宗因無以為異品其義如何七因明論説九似宗基法師云陳那菩薩不立能別不成者中因考中因二字恐因中若不共不定故右件一義於理未決諸因明師皆云似同喻中所立不成所以不立今案理旨何必不共不定過耶且如眼等神我受用積聚性故如臥具等此即其宗能別不成臥具等喻所立不成積聚之因何為不共雖以臥具為宗異品猶因復轉不共之義亦不成也其旨如何八吉藏師釋百論名云論有百偈故以百為名此論有二十品各有正偈後十品無益此土故不翻之文軌師云此説謬也尋梵本但有十品右一條言二説各別何可取中九龍樹傳云龍樹菩薩將去此世間小乘法師云汝樂我久住此考此傳文作世不答言實不願也退入間室徑日不出弟子破戶看之遂蟬蛻而去也西域記云依王子請以乾茅葉自刎其頸若利劍斷割身首異處右件二傳依何定旨十肇論云羅什匿曜涼土者元康疏云言涼土者北涼阻渠蒙遜也言什前止北涼而韜智未曜也右謂恐是言蓋誤矣何者羅什前至于長安蒙遜後興北涼然則時處既別人何相關耶故什傳云什以弘始三年至于長安王道圭帝記云北涼蒙遜以弘始四年當遜興初永安元年始興北涼也今撿疏與傳相違不同盍疑相錯十一考今案此者付第考第下恐脫一字未決章疏故故十條耳又此疏末湜師云此疏聊附草本多不如法幸恕之恐是草本而蓋違謬焉請求真本以前十條之事録顯如件大法師慚安滿位僧秀忍滿位僧神範成實論未決義如左合二條一成實論家云從無明初念來人三界內三界內是分段未入三界內是變易生死修無漏定解脫斷除煩惱變出還於佛果若爾變出時初來時為是一種變易為是別耶論師解不同一云無二種變易生死變還感來時變易也二云變出既以無漏感故感別變易非是初來時變易初來時以無明為因因既異故變易不同也一説唯有來時變易若依第二説有來時變時二種變易云云又仁王經説三界之外有法者是外道大有經説非七佛之所説何故彼論云從無明初念來入三界內豈三界外更有無明耶願詳其旨二問彼論宗云四塵能造四大所造見其所説何似數論外道所説若言論師是數論師之苗裔故述本宗者既回邪歸正更陳本宗有何益耶未度書成實論新撰疏并章抄等可採求也傳燈滿位僧賢融俱舍宗問薩婆多宗云三世考世下恐脫實有二字法體恆有者若生滅而恆有耶若不生滅而恆有耶若生滅而恆有者法體可有取果與果用若不生滅而恆有者不可説言有為法也未度書安慧論師所造俱舍糅釋施設足論并疏顯宗論疏順正論疏大法師善報傳燈滿位僧勝貴右被去寶龜六年十二月十三日綱所牒稱了事學頭專為別當請率供別知法大法師并聽利僧等勘出各宗一切經論草疏傳集等所疑文義等寄返學僧等以決所疑者今依牒旨注顯別宗未決文義并未度來書等申上如件以牒上寶龜七年二月五日少學頭傳燈入位僧奉基大學頭大法師性泰寺主兼大學頭大法師實忠大學頭大法師勝康
